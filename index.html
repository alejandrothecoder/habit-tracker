<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Consistency Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #dce8f5; color: #222; font-size: 13px; }

  .nav {
    background: #e8f0f8;
    border-bottom: 1px solid #c8d8e8;
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 58px;
    gap: 16px;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-icon { width: 38px; height: 38px; background: #4a5a7a; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .nav-icon svg { fill: white; }
  .nav-brand { line-height: 1.2; }
  .nav-brand .sub { font-size: 10px; font-weight: 600; color: #6a7a9a; letter-spacing: 0.08em; }
  .nav-brand .main { font-size: 15px; font-weight: 700; color: #2a3a5a; letter-spacing: 0.02em; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .nav-pill { padding: 7px 20px; border-radius: 20px; border: 1.5px solid #b0c4da; background: white; font-size: 13px; cursor: pointer; color: #4a5a7a; font-weight: 500; }
  .nav-pill.active { border-color: #4a5a7a; color: #2a3a5a; font-weight: 600; }
  .nav-email { font-size: 12px; color: #7a8aaa; margin-left: 10px; }
  .nav-logout { font-size: 13px; color: #2a3a5a; cursor: pointer; font-weight: 600; margin-left: 6px; }

  .layout { display: flex; gap: 16px; padding: 16px; height: calc(100vh - 58px); overflow: hidden; }

  .left-col { display: flex; flex-direction: column; gap: 12px; width: 200px; min-width: 200px; }
  .sidebar-card { background: white; border-radius: 12px; padding: 14px 12px; flex: 1; overflow-y: auto; }
  .sidebar-section { margin-bottom: 16px; }
  .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .sidebar-title { font-weight: 700; font-size: 15px; color: #1a2a3a; }
  .edit-btn { font-size: 12px; color: #5b8dee; cursor: pointer; font-weight: 500; }
  .habit-item { padding: 7px 2px; font-size: 13px; color: #2a3a5a; border-bottom: 1px solid #f0f4f8; }
  .habit-item:last-child { border-bottom: none; }

  .month-tabs-wrap { background: white; border-radius: 12px; padding: 0 6px; overflow-x: auto; white-space: nowrap; }
  .month-tabs { display: flex; }
  .month-tab { padding: 9px 8px; font-size: 11px; color: #7a8aaa; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; display: inline-block; }
  .month-tab.active { color: #2a3a5a; border-bottom-color: #2a3a5a; font-weight: 600; }

  .main-card { flex: 1; background: white; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow: hidden; min-width: 0; }
  .month-header { display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
  .month-name { font-size: 36px; font-weight: 900; color: #1a2a4a; letter-spacing: -1px; }
  .month-quote { font-size: 11.5px; color: #8a9ab0; font-style: italic; flex: 1; }
  .chart-label { font-size: 11px; color: #8a9ab0; font-weight: 600; margin-bottom: 4px; }
  .chart-wrap { position: relative; height: 110px; }

  .grid-wrap { flex: 1; overflow: auto; border: 1px solid #e8eef6; border-radius: 8px; }
  .grid-table { border-collapse: collapse; min-width: max-content; }
  .week-group-header { background: #f0f5fc; }
  .week-group-cell { text-align: center; font-size: 11px; font-weight: 600; color: #5a7aaa; padding: 5px 0; border-right: 2px solid #d0dcec; border-bottom: 1px solid #e0e8f4; }
  .week-group-cell:last-child { border-right: none; }
  .day-num-row { background: #f8fafd; }
  .day-num-cell { width: 30px; text-align: center; font-size: 11px; font-weight: 600; color: #6a7a9a; padding: 4px 0; border-bottom: 1px solid #e8eef6; }
  .day-num-cell.we { border-right: 2px solid #d0dcec; }
  .label-cell { width: 130px; min-width: 130px; }
  .habit-row td { border-bottom: 1px solid #f0f4f8; }
  .habit-label { font-size: 12px; color: #2a3a5a; padding: 5px 10px; white-space: nowrap; font-weight: 500; }
  .cb-cell { width: 30px; text-align: center; padding: 3px 0; }
  .cb-cell.we { border-right: 2px solid #d0dcec; }
  .cb-cell input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #4a8de8; }
  .pct-row td { background: #f0f5fc; }
  .pct-val { width: 30px; text-align: center; font-size: 10px; color: #9ab0cc; padding: 3px 0; font-weight: 500; }
  .pct-val.has { color: #4a8de8; font-weight: 700; }
  .pct-val.we { border-right: 2px solid #d0dcec; }
  .time-divider td { background: #f8fafd; border-top: 2px solid #e0e8f4; border-bottom: 1px solid #e8eef6; height: 4px; }
  .time-label { font-size: 12px; color: #4a5a7a; padding: 5px 10px; white-space: nowrap; }
  .time-ic { width: 30px; text-align: center; }
  .time-ic.we { border-right: 2px solid #d0dcec; }
  .time-inp { width: 28px; font-size: 10px; text-align: center; border: none; background: transparent; color: #4a5a7a; padding: 4px 0; }
  .time-inp:focus { outline: none; }

  .right-card { width: 240px; min-width: 240px; background: white; border-radius: 12px; padding: 18px; display: flex; flex-direction: column; overflow-y: auto; }
  .score-title { font-size: 13px; color: #8a9ab0; font-weight: 600; margin-bottom: 14px; text-align: center; }
  .score-ring-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; }
  .score-ring-wrap canvas { width: 150px; height: 150px; }
  .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 22px; font-weight: 800; color: #1a2a4a; }
  .prog-title { font-size: 13px; font-weight: 800; color: #1a2a3a; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .prog-item { margin-bottom: 9px; }
  .prog-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .prog-name { font-size: 12px; color: #2a3a5a; font-weight: 500; }
  .prog-pct { font-size: 12px; color: #7a8aaa; }
  .prog-bg { height: 7px; background: #e4eaf4; border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 7px; border-radius: 4px; transition: width 0.3s; }
  .prog-divider { border: none; border-top: 1px solid #e8eef6; margin: 8px 0; }
  .prog-avg { display: flex; justify-content: space-between; margin-top: 4px; }
  .time-avg-title { font-size: 13px; font-weight: 800; color: #1a2a3a; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 8px; }
  .time-avg-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0f4f8; }
  .time-avg-name { font-size: 12px; color: #2a3a5a; }
  .time-avg-val { font-size: 12px; color: #7a8aaa; }

  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(30,50,90,0.25); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: white; border-radius: 14px; padding: 24px; width: 340px; box-shadow: 0 12px 40px rgba(30,50,90,0.18); }
  .modal-title { font-size: 16px; font-weight: 700; color: #1a2a4a; margin-bottom: 16px; }
  .modal-list { list-style: none; margin-bottom: 14px; }
  .modal-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f4f8; }
  .modal-item span { font-size: 13px; color: #2a3a5a; }
  .remove-btn { color: #cc4444; font-size: 15px; cursor: pointer; border: none; background: none; padding: 0 6px; }
  .modal-add { display: flex; gap: 8px; margin-bottom: 14px; }
  .modal-add input { flex: 1; border: 1.5px solid #d0dcec; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
  .modal-add input:focus { border-color: #4a8de8; }
  .modal-add button { background: #4a8de8; color: white; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .modal-close { width: 100%; background: #f0f5fc; border: 1.5px solid #d0dcec; border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer; color: #2a3a5a; font-weight: 500; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const QUOTES=[
  '"We are what we repeatedly do. Excellence, then, is not an act, but a habit." - Aristotle',
  '"Success is the sum of small efforts, repeated day in and day out." - Robert Collier',
  '"Discipline is the bridge between goals and accomplishment." - Jim Rohn',
  '"The secret of your future is hidden in your daily routine." - Mike Murdock',
  '"Motivation gets you going, but discipline keeps you growing." - John C. Maxwell',
  '"It does not matter how slowly you go as long as you do not stop." - Confucius',
  '"A year from now you may wish you had started today." - Karen Lamb',
  '"Small daily improvements over time lead to stunning results." - Robin Sharma',
  '"You don\'t rise to the level of your goals, you fall to the level of your systems." - James Clear',
  '"The only way to do great work is to love what you do." - Steve Jobs',
  '"Push yourself, because no one else is going to do it for you." - Anonymous',
  '"Be stronger than your strongest excuse." - Anonymous'
];
const COLORS=['#4a8de8','#e87a4a','#4ac8a0','#a07ae8','#e8c84a','#e84a7a','#4ae8c8','#8ae84a','#e84a4a'];
const DEF_HABITS=['Wake up 7:30','Eat Meal Prep','Run','5 min music','5 min photos','5 Min Reading','No kush','No corn','Bed by 11PM'];
const DEF_TIME=['Work','School','Physical'];

function getDays(m,y){return new Date(y,m+1,0).getDate();}
function load(){try{const s=localStorage.getItem('cdb3');if(s)return JSON.parse(s);}catch(e){}return null;}
function save(){try{localStorage.setItem('cdb3',JSON.stringify({habits:S.habits,timeCategories:S.timeCategories,checks:S.checks,times:S.times}));}catch(e){}}

const today=new Date(), sv=load();
let S={
  m:today.getMonth(), y:today.getFullYear(),
  habits:sv?sv.habits:[...DEF_HABITS],
  timeCategories:sv?sv.timeCategories:[...DEF_TIME],
  checks:sv?sv.checks:{}, times:sv?sv.times:{},
  showM:false, showT:false, nH:'', nT:''
};

function ck(hi,d){return `${hi}_${d}_${S.m}_${S.y}`;}
function tk(ci,d){return `t${ci}_${d}_${S.m}_${S.y}`;}
function dayPct(d){if(!S.habits.length)return 0;let c=0;S.habits.forEach((_,i)=>{if(S.checks[ck(i,d)])c++;});return Math.round(c/S.habits.length*100);}
function habitPct(hi){const days=getDays(S.m,S.y);let c=0;for(let d=1;d<=days;d++)if(S.checks[ck(hi,d)])c++;return Math.round(c/days*100);}
function overall(){if(!S.habits.length)return 0;const days=getDays(S.m,S.y);let tot=0,fil=0;S.habits.forEach((_,i)=>{for(let d=1;d<=days;d++){tot++;if(S.checks[ck(i,d)])fil++;}});return tot===0?0:parseFloat((fil/tot*100).toFixed(1));}
function timeAvg(ci){const days=getDays(S.m,S.y);let t=0;for(let d=1;d<=days;d++)t+=parseFloat(S.times[tk(ci,d)]||0);return(t/days).toFixed(1);}
function weeks(days){const w=[];let n=1,s=1;while(s<=days){const e=Math.min(s+6,days);w.push({label:`Week ${n}`,s,e});s=e+1;n++;}return w;}

let LC=null,RC=null;

function render(){
  const days=getDays(S.m,S.y), ov=overall(), wks=weeks(days), q=QUOTES[S.m%QUOTES.length];
  const weMap={};wks.forEach(w=>{weMap[w.e]=true;});

  document.getElementById('app').innerHTML=`
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg></div>
      <div class="nav-brand"><div class="sub">THE</div><div class="main">CONSISTENCY DASHBOARD</div></div>
    </div>
    <div class="nav-right">
      <button class="nav-pill active">Dashboard</button>
      <button class="nav-pill">Planning</button>
      <span class="nav-email">user@example.com</span>
      <span class="nav-logout">Log out</span>
    </div>
  </nav>
  <div class="layout">
    <div class="left-col">
      <div class="sidebar-card">
        <div class="sidebar-section">
          <div class="sidebar-header"><span class="sidebar-title">Habits</span><span class="edit-btn" id="eH">Edit</span></div>
          ${S.habits.map(h=>`<div class="habit-item">${h}</div>`).join('')}
        </div>
        <div class="sidebar-section">
          <div class="sidebar-header"><span class="sidebar-title">Time Spent<br>Daily</span><span class="edit-btn" id="eT">Edit</span></div>
          ${S.timeCategories.map(c=>`<div class="habit-item">${c}</div>`).join('')}
        </div>
      </div>
      <div class="month-tabs-wrap">
        <div class="month-tabs">${MONTHS.map((m,i)=>`<div class="month-tab${i===S.m?' active':''}" data-mi="${i}">${m}</div>`).join('')}</div>
      </div>
    </div>

    <div class="main-card">
      <div class="month-header">
        <div class="month-name">${MONTHS[S.m].toUpperCase()}</div>
        <div class="month-quote">${q}</div>
      </div>
      <div>
        <div class="chart-label">Daily Progress</div>
        <div class="chart-wrap"><canvas id="LC"></canvas></div>
      </div>
      <div class="grid-wrap">
        <table class="grid-table">
          <thead>
            <tr class="week-group-header">
              <td class="label-cell"></td>
              ${wks.map(w=>`<td colspan="${w.e-w.s+1}" class="week-group-cell">${w.label}</td>`).join('')}
            </tr>
            <tr class="day-num-row">
              <td class="label-cell"></td>
              ${Array.from({length:days},(_,i)=>{const d=i+1;return`<td class="day-num-cell${weMap[d]?' we':''}">${d}</td>`;}).join('')}
            </tr>
          </thead>
          <tbody>
            ${S.habits.map((h,hi)=>`
              <tr class="habit-row">
                <td class="habit-label">${h}</td>
                ${Array.from({length:days},(_,di)=>{const d=di+1,chk=S.checks[ck(hi,d)]?'checked':'',we=weMap[d]?' we':'';return`<td class="cb-cell${we}"><input type="checkbox" data-hi="${hi}" data-day="${d}" ${chk}></td>`;}).join('')}
              </tr>`).join('')}
            <tr class="pct-row">
              <td class="habit-label" style="font-size:10px;color:#9ab0cc;">% done</td>
              ${Array.from({length:days},(_,di)=>{const d=di+1,p=dayPct(d),we=weMap[d]?' we':'';return`<td class="pct-val${p>0?' has':''}${we}">${p}%</td>`;}).join('')}
            </tr>
            <tr class="pct-row">
              <td class="habit-label" style="font-size:10px;color:#ccc;"></td>
              ${Array.from({length:days},(_,di)=>{const d=di+1,we=weMap[d]?' we':'';return`<td class="pct-val${we}" style="color:#b0c4da;">${d}</td>`;}).join('')}
            </tr>
            <tr class="time-divider"><td colspan="${days+1}"></td></tr>
            ${S.timeCategories.map((c,ci)=>`
              <tr class="habit-row">
                <td class="time-label">${c}</td>
                ${Array.from({length:days},(_,di)=>{const d=di+1,we=weMap[d]?' we':'';return`<td class="time-ic${we}"><input class="time-inp" type="number" min="0" max="24" step="0.5" value="${S.times[tk(ci,d)]||''}" placeholder="0" data-ci="${ci}" data-day="${d}"></td>`;}).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="right-card">
      <div class="score-title">Discipline Score</div>
      <div class="score-ring-wrap">
        <canvas id="RC" width="150" height="150"></canvas>
        <div class="score-text">${ov}%</div>
      </div>
      <div class="prog-title">Progress</div>
      ${S.habits.map((h,i)=>{const p=habitPct(i),col=COLORS[i%COLORS.length];return`<div class="prog-item"><div class="prog-row"><span class="prog-name">${h}</span><span class="prog-pct">${p}%</span></div><div class="prog-bg"><div class="prog-fill" style="width:${p}%;background:${col};"></div></div></div>`;}).join('')}
      <hr class="prog-divider">
      <div class="prog-avg"><span style="font-size:12px;color:#8a9ab0;">Average</span><span style="font-size:12px;font-weight:700;color:#2a3a5a;">${ov}%</span></div>
      <div class="time-avg-title">Average Time Spent Per Day</div>
      ${S.timeCategories.map((c,ci)=>`<div class="time-avg-row"><span class="time-avg-name">${c}</span><span class="time-avg-val">${timeAvg(ci)} h</span></div>`).join('')}
    </div>
  </div>

  ${S.showM?`<div class="modal-overlay" id="mO"><div class="modal">
    <div class="modal-title">Edit Habits</div>
    <ul class="modal-list">${S.habits.map((h,i)=>`<li class="modal-item"><span>${h}</span><button class="remove-btn" data-ri="${i}">&#x2715;</button></li>`).join('')}</ul>
    <div class="modal-add"><input id="nHI" placeholder="Add new habit..." value="${S.nH}"><button id="aH">Add</button></div>
    <button class="modal-close" id="cM">Done</button>
  </div></div>`:''}
  ${S.showT?`<div class="modal-overlay" id="tO"><div class="modal">
    <div class="modal-title">Edit Time Categories</div>
    <ul class="modal-list">${S.timeCategories.map((c,i)=>`<li class="modal-item"><span>${c}</span><button class="remove-btn" data-tri="${i}">&#x2715;</button></li>`).join('')}</ul>
    <div class="modal-add"><input id="nTI" placeholder="Add new category..." value="${S.nT}"><button id="aT">Add</button></div>
    <button class="modal-close" id="cT">Done</button>
  </div></div>`:''}
  `;

  // Charts
  const lc=document.getElementById('LC');
  if(lc){if(LC)LC.destroy();LC=new Chart(lc,{type:'line',data:{labels:Array.from({length:days},(_,i)=>i+1),datasets:[{data:Array.from({length:days},(_,i)=>dayPct(i+1)),borderColor:'#4a8de8',backgroundColor:'rgba(74,141,232,0.07)',fill:true,tension:0.35,pointRadius:2,pointBackgroundColor:'#4a8de8',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10},color:'#9ab0cc',stepSize:25},grid:{color:'#eef2f8'},border:{display:false}},x:{ticks:{font:{size:10},color:'#9ab0cc',maxTicksLimit:10},grid:{display:false},border:{display:false}}}}});}
  const rc=document.getElementById('RC');
  if(rc){if(RC)RC.destroy();RC=new Chart(rc,{type:'doughnut',data:{datasets:[{data:[ov,100-ov],backgroundColor:['#4a8de8','#dce8f5'],borderWidth:0}]},options:{cutout:'80%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});}

  // Events
  document.querySelectorAll('.month-tab').forEach(el=>el.addEventListener('click',()=>{S.m=parseInt(el.dataset.mi);render();}));
  document.querySelectorAll('input[data-hi]').forEach(el=>el.addEventListener('change',()=>{const k=ck(parseInt(el.dataset.hi),parseInt(el.dataset.day));if(el.checked)S.checks[k]=true;else delete S.checks[k];save();render();}));
  document.querySelectorAll('input[data-ci]').forEach(el=>el.addEventListener('change',()=>{S.times[tk(parseInt(el.dataset.ci),parseInt(el.dataset.day))]=parseFloat(el.value)||0;save();render();}));

  const eH=document.getElementById('eH');if(eH)eH.addEventListener('click',()=>{S.showM=true;render();});
  const eT=document.getElementById('eT');if(eT)eT.addEventListener('click',()=>{S.showT=true;render();});
  const cM=document.getElementById('cM');if(cM)cM.addEventListener('click',()=>{S.showM=false;render();});
  const cT=document.getElementById('cT');if(cT)cT.addEventListener('click',()=>{S.showT=false;render();});

  const nHI=document.getElementById('nHI');if(nHI){nHI.addEventListener('input',e=>{S.nH=e.target.value;});nHI.focus();}
  const aH=document.getElementById('aH');if(aH)aH.addEventListener('click',()=>{if(S.nH.trim()){S.habits.push(S.nH.trim());S.nH='';save();render();}});
  const nTI=document.getElementById('nTI');if(nTI){nTI.addEventListener('input',e=>{S.nT=e.target.value;});nTI.focus();}
  const aT=document.getElementById('aT');if(aT)aT.addEventListener('click',()=>{if(S.nT.trim()){S.timeCategories.push(S.nT.trim());S.nT='';save();render();}});

  document.querySelectorAll('.remove-btn[data-ri]').forEach(el=>el.addEventListener('click',()=>{S.habits.splice(parseInt(el.dataset.ri),1);save();render();}));
  document.querySelectorAll('.remove-btn[data-tri]').forEach(el=>el.addEventListener('click',()=>{S.timeCategories.splice(parseInt(el.dataset.tri),1);save();render();}));

  const mO=document.getElementById('mO');if(mO)mO.addEventListener('click',e=>{if(e.target===mO){S.showM=false;render();}});
  const tO=document.getElementById('tO');if(tO)tO.addEventListener('click',e=>{if(e.target===tO){S.showT=false;render();}});
}

render();
</script>
</body>
</html>
